services:
  - type: web
    name: spi-api
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @spi/api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        sync: false
      - key: SHOPIFY_API_VERSION
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: TIKTOK_APP_KEY
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: TIKTOK_REDIRECT_URI
        sync: false
      - key: TIKTOK_API_BASE_URL
        sync: false
      - key: TIKTOK_WEBHOOK_SECRET
        sync: false

  - type: worker
    name: spi-worker
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm prisma:generate && pnpm --filter @spi/worker build
    startCommand: node apps/worker/dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: TIKTOK_APP_KEY
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: TIKTOK_API_BASE_URL
        sync: false
      - key: TIKTOK_SHOP_REFRESH_PATH
        sync: false
